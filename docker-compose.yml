services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gitmetrics-app
    env_file:
      - .env
    expose:
      - "3001"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: gitmetrics-nginx
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
